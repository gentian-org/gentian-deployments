apiVersion: gentianos.io/v1alpha1
kind: Tenant
metadata:
  name: demo
spec:
  adminEmail: admin-demo@gentian.org
  displayName: Demo
  isolation:
    databasePrefix: demo_
    keycloakRealm: demo
    ldapOU: ou=demo
    s3Prefix: demo-
  deletionPolicy: Retain
  apps:
  - profile: xwiki
  - profile: openproject
  - profile: element
    config:
      extraValues:
        synapse:
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "100m"
              memory: "256Mi"
        synapseWeb:
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "25m"
              memory: "32Mi"
        jitsi:
          jvb:
            resources:
              limits:
                cpu: "500m"
                memory: "512Mi"
              requests:
                cpu: "50m"
                memory: "128Mi"
          jicofo:
            resources:
              limits:
                cpu: "250m"
                memory: "256Mi"
              requests:
                cpu: "25m"
                memory: "64Mi"
          prosody:
            resources:
              limits:
                cpu: "250m"
                memory: "256Mi"
              requests:
                cpu: "25m"
                memory: "64Mi"
          web:
            resources:
              limits:
                cpu: "100m"
                memory: "128Mi"
              requests:
                cpu: "25m"
                memory: "32Mi"
  - profile: app-store
  - profile: ox-appsuite
    config:
      extraValues:
        appsuite:
          core-mw:
            resources:
              limits:
                cpu: "500m"
                memory: "2Gi"
              requests:
                cpu: "100m"
                memory: "1Gi"
          core-documentconverter:
            resources:
              limits:
                cpu: "250m"
                memory: "1Gi"
              requests:
                cpu: "50m"
                memory: "512Mi"
          core-imageconverter:
            resources:
              limits:
                cpu: "250m"
                memory: "1Gi"
              requests:
                cpu: "50m"
                memory: "512Mi"
          core-ui-middleware:
            resources:
              limits:
                cpu: "250m"
                memory: "512Mi"
              requests:
                cpu: "50m"
                memory: "192Mi"
  quotas:
    cpu: "16"
    memory: 16Gi
    storage: 100Gi
    maxApps: 10
    maxPods: 40
