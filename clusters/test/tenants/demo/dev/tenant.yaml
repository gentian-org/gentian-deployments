apiVersion: gentianos.io/v1alpha1
kind: Tenant
metadata:
  name: demo
spec:
  adminEmail: admin-demo@desk.gentian.org
  displayName: Demo
  isolation:
    databasePrefix: demo_
    keycloakRealm: demo
    s3Prefix: demo-
  deletionPolicy: Retain
  apps:
  - profile: app-store
  - profile: nextcloud
  - profile: element
    # Jitsi is bundled as an Element sidecar (see gentian-apps/profiles/element.yaml).
