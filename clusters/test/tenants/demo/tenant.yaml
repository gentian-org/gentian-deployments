apiVersion: gentianos.io/v1alpha1
kind: Tenant
metadata:
  name: demo
spec:
  adminEmail: admin-demo@desk.gentian.org
  displayName: Demo
  isolation:
    databasePrefix: demo_
    keycloakRealm: demo
    s3Prefix: demo-
  deletionPolicy: Retain
  apps:
  - profile: nextcloud-suite
  - profile: activepieces
  - profile: open-webui
  - profile: app-store
  # Gentian Subscriptions (ApiProfile) — commerce/billing tile, installed by
  # default (opt-out). Requires gentian-os with the api deployment method (Phase B).
  - profile: gentian-subscriptions
