---
# app-of-apps.yaml — Gentian OS ArgoCD Applications
#
# Two separate Applications so that Tenant provisioning state never blocks
# operator image rollouts:
#
#   gentian-os      (wave 0): operator Helm chart + ImageUpdater CR only.
#                             argocd-image-updater targets this app exclusively,
#                             giving it a clean sync surface: new image → deployed
#                             in seconds regardless of tenant health.
#
#   gentian-tenants (wave 2): Tenant CRs only.
#                             Long-running provisioning jobs stay isolated here.
#
#   gentian-portal (wave 1): Portal shell Helm chart — see gentian-portal-dev.yaml
#
# Community AppProfiles from gentian-apps are managed by the separate
# `gentian-appprofiles` Application installed by gentian-os/install.sh.
#
# Apply:
#   kubectl apply -f clusters/test/kernel/app-of-apps-dev.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gentian-os
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # Image updater: follow new builds published for develop and patch image.tag.
    argocd-image-updater.argoproj.io/image-list: gentianos=ghcr.io/gentian-org/gentian-os:develop
    argocd-image-updater.argoproj.io/gentianos.update-strategy: newest-build
    argocd-image-updater.argoproj.io/gentianos.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/gentianos.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: gentian
  ignoreDifferences:
  - group: admissionregistration.k8s.io
    kind: ValidatingWebhookConfiguration
    name: gentian-os-tenant-validator
    jsonPointers:
    - /webhooks/0/clientConfig/caBundle
  - group: apps
    kind: Deployment
    name: gentian-os
    namespace: gentian-system
    jsonPointers:
    - /metadata/annotations
    - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
  # CRDs: Kubernetes API server adds spec.conversion.strategy: "None" as a
  # default when no conversion webhook is configured. Ignore it to prevent
  # a perpetual OutOfSync loop.
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    jsonPointers:
    - /spec/conversion
  # ExternalSecret: external-secrets operator adds default values for several
  # remoteRef and target fields after creation. Ignore them to prevent drift.
  - group: external-secrets.io
    kind: ExternalSecret
    jqPathExpressions:
    - .spec.data[].remoteRef.conversionStrategy
    - .spec.data[].remoteRef.decodingStrategy
    - .spec.data[].remoteRef.metadataPolicy
    - .spec.data[].remoteRef.nullBytePolicy
    - .spec.target.deletionPolicy
  sources:
  # Source 1: gentian-os Helm chart (operator)
  - repoURL: https://github.com/gentian-org/gentian-os
    targetRevision: develop
    path: charts/gentian-os
    helm:
      parameters:
      # Override stale install-time patches that incorrectly pinned platform-kernel.
      - name: infraNamespace
        value: gentian-infra-dev
      valueFiles:
      - $deploy/clusters/test/kernel/values-base.yaml
      - $deploy/clusters/test/kernel/values-dev.yaml
  # Source 2: deployments ref only (provides $deploy variable, no manifests)
  - repoURL: https://github.com/gentian-org/gentian-deployments
    targetRevision: main
    ref: deploy
  # Source 3: Cluster kernel config (stage-specific ImageUpdater CR)
  - repoURL: https://github.com/gentian-org/gentian-deployments
    targetRevision: main
    path: clusters/test/kernel
    directory:
      include: "image-updater-dev.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: gentian-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
---
# Tenant CRs — kept in a separate ApplicationSet so provisioning state cannot
# stall the operator image rollout above.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gentian-tenants
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      repoURL: https://github.com/gentian-org/gentian-deployments
      revision: main
      directories:
      - path: clusters/test/tenants/*/dev
  template:
    metadata:
      name: '{{ .path.path | replace "/" "-" }}'
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: gentian
      source:
        repoURL: https://github.com/gentian-org/gentian-deployments
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: gentian-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
