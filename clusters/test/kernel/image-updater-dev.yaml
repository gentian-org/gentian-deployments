---
# Argo CD Image Updater (CRD mode)
#
# This CR tells the controller to manage Argo Applications named
# "gentian-os" and "gentian-portal" in the argocd namespace. Per-image
# update behavior is driven by annotations on those Applications.
#
# NOTE: must live in the argocd namespace because the controller is configured
# with watch.namespaces=argocd (IMAGE_UPDATER_WATCH_NAMESPACES).  The controller
# then also looks for Applications in that same namespace, which is where ArgoCD
# keeps its Application resources.
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: gentian-os
  namespace: argocd
spec:
  writeBackConfig:
    method: argocd
  applicationRefs:
    - namePattern: "gentian-os"
      useAnnotations: true
    - namePattern: "gentian-portal"
      useAnnotations: true
