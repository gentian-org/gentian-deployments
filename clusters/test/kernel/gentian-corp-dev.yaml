---
# Gentian front-office app (gentian-corp) — ArgoCD Application (test / dev cluster).
#
# Apply to cluster manually to initialize GitOps management:
#   kubectl apply -f clusters/test/kernel/gentian-corp-dev.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gentian-corp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # Image updater: follow new builds published for main branch and patch image tag
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/gentian-org/gentian-corp:main
    argocd-image-updater.argoproj.io/app.update-strategy: newest-build
    # Write back parameter overrides to ArgoCD directly
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: gentian
  source:
    repoURL: https://github.com/gentian-org/gentian-deployments
    targetRevision: main
    path: clusters/test/kernel/gentian-corp
  destination:
    server: https://kubernetes.default.svc
    namespace: gentian-corp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 2m
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
