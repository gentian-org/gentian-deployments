# values-dev.yaml — dev stage overlay for gentian-os Helm chart
#
# Merge order:
#   1) values-base.yaml
#   2) values-dev.yaml (this file)

logLevel: debug

stage: dev

image:
  # Dev tracks the latest develop build; Argo CD Image Updater mutates image.tag.
  tag: "develop"
  digest: ""
  pullPolicy: Always

ldap:
  server: "ldap://nubus-dev-ldap-server.gentian-dev.svc.cluster.local:389"
  base: "dc=swp-ldap,dc=internal"
  # Service account for OX App Suite directory lookups (non-secret; password in OpenBao).
  bindSearchDn: "uid=ldapsearch_ox,cn=users,dc=swp-ldap,dc=internal"

cloudflare:
  zoneID: "03bed96926ccd1830ec74c1a9f9b00cd"
  tunnelCNAME: "3bb57659-9a7f-4613-81d9-7b785d2a177a.cfargotunnel.com"
  apiTokenSecretRef:
    name: "cloudflare-api-token-gentian-system"
    key: "api-token"
    openbaoPath: "gentian-os/kernel/dns/cloudflare"

kernelDomain: "desk.gentian.org"
kernelRealm: "kernel"

# Infra (MinIO, MariaDB, Redis) lives in gentian-infra-dev — see values-base.yaml and
# cluster-settings.env MINIO_ENDPOINT. Do not override infraNamespace here with
# platform-kernel (breaks app-init s3-init egress to MinIO).
servicesNamespace: platform-kernel

authzBridge:
  enabled: true
  openfgaURL: "http://gentian-openfga.platform-kernel.svc.cluster.local:8080"
  # openfgaToken is injected at install time via Argo CD Helm parameters (not stored in git).

# Dev uses Let's Encrypt staging (pair with ACME_ENV=staging in install.env).
# Certs are untrusted in browsers but avoid production rate limits on reinstall.
tenantDNS01ClusterIssuer: "letsencrypt-staging-dns01-cloudflare"

kernelServices:
  keycloakInternalURL: "http://gentian-idp-keycloak-keycloakx-http.platform-kernel.svc.cluster.local:8080/auth"
  s3Endpoint: "http://minio-dev.gentian-infra-dev.svc.cluster.local:9000"
  mysqlHost: "opendesk-mariadb-dev.gentian-infra-dev.svc.cluster.local"
  redisHost: "redis-dev-master.gentian-infra-dev.svc.cluster.local"
  smtpHost: "postfix-dev.gentian-dev.svc.cluster.local"

metrics:
  serviceMonitor:
    enabled: false   # no Prometheus installed in dev by default

appLifecycle:
  deployments:
    enabled: true
    cluster: test
    stage: dev
    gitCredentialsSecret: gentian-deployments-git-credentials
    repo: https://github.com/gentian-org/gentian-deployments

commerce:
  enabled: true
  corpAPIURL: "http://gentian-corp.gentian-corp.svc.cluster.local:8000"
  operatorToken: "gentian-operator-token-secret-change-me"
  meteringInterval: "2m"

platformSecurityPolicy:
  allowedMacWaivers:
    - profile: element
      policy: gentian-require-non-root
      scope: sidecar-jitsi
    - profile: element
      policy: gentian-restrict-capabilities
      scope: sidecar-jitsi
    # nextcloud-base waivers
    - profile: nextcloud-base
      policy: gentian-disallow-privilege-escalation
      scope: nextcloud
    - profile: nextcloud-base
      policy: gentian-require-seccomp
      scope: nextcloud
    # nextcloud-office waivers
    - profile: nextcloud-office
      policy: gentian-disallow-privilege-escalation
      scope: nextcloud
    - profile: nextcloud-office
      policy: gentian-require-seccomp
      scope: nextcloud
    - profile: nextcloud-office
      policy: gentian-disallow-privilege-escalation
      scope: collabora
    - profile: nextcloud-office
      policy: gentian-require-seccomp
      scope: collabora
    - profile: nextcloud-office
      policy: gentian-restrict-capabilities
      scope: collabora
    # nextcloud-office-plus waivers
    - profile: nextcloud-office-plus
      policy: gentian-disallow-privilege-escalation
      scope: nextcloud
    - profile: nextcloud-office-plus
      policy: gentian-require-seccomp
      scope: nextcloud
    - profile: nextcloud-office-plus
      policy: gentian-disallow-privilege-escalation
      scope: collabora
    - profile: nextcloud-office-plus
      policy: gentian-require-seccomp
      scope: collabora
    - profile: nextcloud-office-plus
      policy: gentian-restrict-capabilities
      scope: collabora
    # nextcloud-suite waivers
    - profile: nextcloud-suite
      policy: gentian-disallow-privilege-escalation
      scope: nextcloud
    - profile: nextcloud-suite
      policy: gentian-require-seccomp
      scope: nextcloud
    - profile: nextcloud-suite
      policy: gentian-disallow-privilege-escalation
      scope: collabora
    - profile: nextcloud-suite
      policy: gentian-require-seccomp
      scope: collabora
    - profile: nextcloud-suite
      policy: gentian-restrict-capabilities
      scope: collabora

