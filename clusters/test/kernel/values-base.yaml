# values-base.yaml — shared operator values across all stages
#
# Stage overlays (values-dev.yaml / values-staging.yaml / values-prod.yaml)
# should contain only stage-specific deltas.

# Edge routing: Gateway API + Envoy Gateway (see gentian-os/docs/design/gateway.md).
routingMode: gateway

servicesNamespace: gentian-dev
infraNamespace: gentian-infra-dev

openbao:
  address: "http://openbao.openbao.svc.cluster.local:8200"
  authPath: "kubernetes"

argocd:
  namespace: "argocd"
  project: "gentianos-tenants"

defaults:
  isolation:
    mode: "namespace"
