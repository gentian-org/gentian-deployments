---
# app-of-apps-prod.yaml — Gentian OS ArgoCD Applications (production stage)
#
# Apply after bootstrap with GENTIAN_DEPLOYMENTS_STAGE=prod:
#   kubectl apply -f clusters/pck-kulxwmm/kernel/app-of-apps-prod.yaml
#
# Operator image rollouts are isolated from tenant provisioning (see app-of-apps-dev.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gentian-os
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: gentian
  ignoreDifferences:
  - group: admissionregistration.k8s.io
    kind: ValidatingWebhookConfiguration
    name: gentian-os-tenant-validator
    jsonPointers:
    - /webhooks/0/clientConfig/caBundle
  - group: apps
    kind: Deployment
    name: gentian-os
    namespace: gentian-system
    jsonPointers:
    - /metadata/annotations
    - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    jsonPointers:
    - /spec/conversion
  - group: external-secrets.io
    kind: ExternalSecret
    jqPathExpressions:
    - .spec.data[].remoteRef.conversionStrategy
    - .spec.data[].remoteRef.decodingStrategy
    - .spec.data[].remoteRef.metadataPolicy
    - .spec.data[].remoteRef.nullBytePolicy
    - .spec.target.deletionPolicy
  sources:
  - repoURL: https://github.com/gentian-org/gentian-os
    targetRevision: main
    path: charts/gentian-os
    helm:
      valueFiles:
      - $deploy/clusters/pck-kulxwmm/kernel/values-base.yaml
      - $deploy/clusters/pck-kulxwmm/kernel/values-prod.yaml
  - repoURL: https://github.com/gentian-org/gentian-deployments
    targetRevision: main
    ref: deploy
  - repoURL: https://github.com/gentian-org/gentian-deployments
    targetRevision: main
    path: clusters/pck-kulxwmm/kernel
    directory:
      include: "image-updater-prod.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: gentian-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gentian-tenants
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      repoURL: https://github.com/gentian-org/gentian-deployments
      revision: main
      directories:
      - path: clusters/pck-kulxwmm/tenants/*/prod
  template:
    metadata:
      name: '{{ .path.path | replace "/" "-" }}'
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: gentian
      source:
        repoURL: https://github.com/gentian-org/gentian-deployments
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: gentian-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
