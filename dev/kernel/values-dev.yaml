# values-dev.yaml — dev environment overrides for the gentian-os Helm chart
#
# Referenced by dev/app-of-apps.yaml → Source 1 helm.valueFiles
# These override the defaults in charts/gentian-os/values.yaml.

logLevel: debug

image:
  # Dev tracks the latest develop build; Argo CD Image Updater mutates image.tag.
  tag: "develop"
  digest: ""
  pullPolicy: Always

openbao:
  address: "http://openbao.openbao.svc.cluster.local:8200"
  authPath: "kubernetes"

ldap:
  server: "ldap://nubus-dev-ldap-server.gentian-dev.svc.cluster.local:389"
  base: "dc=swp-ldap,dc=internal"

argocd:
  namespace: "argocd"
  project: "gentianos-tenants"

defaults:
  isolation:
    mode: "namespace"

kernelDomain: "desk.gentian.org"
kernelRealm: "kernel"

kernelServices:
  s3Endpoint: "http://minio-dev.gentian-infra-dev.svc.cluster.local:9000"
  mysqlHost: "opendesk-mariadb-dev.gentian-infra-dev.svc.cluster.local"
  redisHost: "redis-dev-master.gentian-infra-dev.svc.cluster.local"

metrics:
  serviceMonitor:
    enabled: false   # no Prometheus installed in dev by default
