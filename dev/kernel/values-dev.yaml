# values-dev.yaml — dev environment overrides for the gentian-os Helm chart
#
# Referenced by dev/app-of-apps.yaml → Source 1 helm.valueFiles
# These override the defaults in charts/gentian-os/values.yaml.

logLevel: debug

image:
  # Pin to immutable digest for deterministic GitOps rollouts.
  # Update this digest via PR when promoting a new operator build.
  digest: "sha256:fd90b798cf77aef25d01faf8b3224f62760bdc0a49d60da1eaf7fbcc21c82dfe"
  pullPolicy: IfNotPresent

openbao:
  address: "http://openbao.openbao.svc.cluster.local:8200"
  authPath: "kubernetes"

argocd:
  namespace: "argocd"
  project: "gentian"

defaults:
  isolation:
    mode: "namespace"

metrics:
  serviceMonitor:
    enabled: false   # no Prometheus installed in dev by default
