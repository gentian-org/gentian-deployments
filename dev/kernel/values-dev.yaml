# values-dev.yaml — dev environment overrides for the gentian-os Helm chart
#
# Referenced by dev/app-of-apps.yaml → Source 1 helm.valueFiles
# These override the defaults in charts/gentian-os/values.yaml.

logLevel: debug

image:
  tag: develop       # track the develop branch image; update to a semver tag for production
  pullPolicy: Always  # always pull so rolling image updates are picked up without tag changes

openbao:
  address: "http://openbao.openbao.svc.cluster.local:8200"
  authPath: "kubernetes"

argocd:
  namespace: "argocd"
  project: "gentian"

defaults:
  isolation:
    mode: "namespace"

metrics:
  serviceMonitor:
    enabled: false   # no Prometheus installed in dev by default
