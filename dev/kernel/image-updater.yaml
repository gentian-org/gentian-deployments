---
# ArgoCD Image Updater configuration for the gentian-os operator
# 
# This configuration ensures that whenever a new gentian-os container image
# is published to GHCR, the operator image is automatically updated across ALL
# tenants in this environment.
#
# Philosophy: The kernel (gentian-os operator) is a shared, singular service.
# All tenants depend on it; all tenants should run the same kernel version.
# When a new kernel is deployed, it affects all tenants consistently.
#
# This scales to N environments (dev, staging, prod) and M tenants within each
# environment without multiplication: one ImageUpdater per environment, not per
# tenant.

apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: gentian-os-kernel
  namespace: argocd
spec:
  # Match all ArgoCD Applications for the gentian-os operator in this environment.
  # Application naming convention: {environment}-kernel-os
  # (e.g., dev-kernel-os, staging-kernel-os, prod-kernel-os)
  applicationRefs:
    - namePattern: "dev-kernel-os"
      images:
        - alias: operator
          imageName: ghcr.io/gentian-org/gentian-os
          # Policy controls which versions are considered for update.
          # Options:
          #   - "semver:v1.2.x" - Pin to v1.2.x releases
          #   - "digest:*" - Update to latest digest of current tag (develop branch)
          #   - "alphabetical" - Latest tag alphabetically
          policy: semver:v1
          # Match tags from specific branches
          tagsMatchRegex: '^(v[0-9]+\.[0-9]+\.[0-9]+|develop-.*)$'
          # Exclude pre-releases and development tags if using semver
          ignoreTagsRegex: '^(.*-rc\..*|.*-alpha)$'

  # Update method: Direct ArgoCD parameter update (no Git commits)
  updateMethod:
    # When a new image is detected, mutate the Application parameters directly.
    # The Application's Helm values are updated via argocd app set --helm-set,
    # not via Git. This keeps the operator image pinning automatic and
    # implementation-transparent — the operator never needs to commit to Git.
    method: argocd
    # (Alternative: method: git would write digests directly to Git, but we avoid
    # this to keep CI and GitOps cleanly separated.)

  # Webhook for immediate updates on registry push (optional but recommended)
  # GHCR sends a webhook when gentian-os image is pushed;
  # Image Updater processes it within 10 seconds.
  webhook:
    enabled: true
    # The exact webhook URL is printed by: kubectl get svc -n argocd-image-updater
    # Point your GHCR webhook to: https://<image-updater-svc>/webhook

---
# Example ArgoCD Application that will be updated by the ImageUpdater above.
# 
# The Application references the gentian-os Helm chart with an explicit
# image tag. ImageUpdater will mutate the Helm overrides to use the new digest
# whenever a new image is pushed.
#
# NOTE: This is templated content for documentation. The actual Application
# may be generated by your deployment automation or stored in a different file.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-kernel-os
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-kernel

  source:
    repoURL: https://github.com/gentian-org/gentian-os
    path: charts/gentian-os
    targetRevision: develop
    helm:
      releaseName: gentian-os
      values: |
        # Base deployment values.
        # ImageUpdater will override image.tag or image.digest when new images arrive.
        image:
          repository: ghcr.io/gentian-org/gentian-os
          tag: develop  # Or digest: sha256:... when ImageUpdater updates
          pullPolicy: IfNotPresent

  destination:
    server: https://kubernetes.default.svc
    namespace: gentian-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
