---
# app-of-apps.yaml — Gentian OS orchestrator + AppProfiles + Tenants
#
# Multi-source ArgoCD Application that ties the deployment architecture together:
#   Repo 1 (gentian-os):          operator + built-in sample AppProfiles + Helm chart
#   Repo 2 (gentian-deployments): this repo — env-specific config + Tenant CRs
#
# Community AppProfiles from gentian-apps are managed by the separate
# `gentian-appprofiles` Application installed by gentian-os/install.sh.
#
# Sync order (via sync-wave):
#   wave 0: CRDs + Helm chart (operator itself installs its own CRDs)
#   wave 1: AppProfile CRs (operator reads these to deploy apps)
#   wave 2: Tenant CRs (operator creates all per-tenant resources)
#
# Apply:
#   kubectl apply -f dev/app-of-apps.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gentian-os
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # Image updater: follow new builds published for develop and patch image.tag.
    argocd-image-updater.argoproj.io/image-list: gentianos=ghcr.io/gentian-org/gentian-os:develop
    argocd-image-updater.argoproj.io/gentianos.update-strategy: newest-build
    argocd-image-updater.argoproj.io/gentianos.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/gentianos.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: gentian
  ignoreDifferences:
  - group: admissionregistration.k8s.io
    kind: ValidatingWebhookConfiguration
    name: gentian-os-tenant-validator
    jsonPointers:
    - /webhooks/0/clientConfig/caBundle
  - group: apps
    kind: Deployment
    name: gentian-os
    namespace: gentian-system
    jsonPointers:
    - /metadata/annotations
    - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
  sources:
  # ── Source 1: gentian-os Helm chart (operator) ────────────────────────────
  - repoURL: https://github.com/gentian-org/gentian-os
    targetRevision: develop
    path: charts/gentian-os
    helm:
      valueFiles:
      - $deploy/dev/kernel/values-dev.yaml
  # ── Source 2: AppProfile CRs from gentian-os (built-in library) ──────────
  - repoURL: https://github.com/gentian-org/gentian-os
    targetRevision: develop
    path: config/samples
    directory:
      include: "appprofile_*.yaml"
  # ── Source 3: Tenant CRs from this deployment repo ───────────────────────
  - repoURL: https://github.com/gentian-org/gentian-deployments
    targetRevision: main
    path: dev/tenants
    ref: deploy
  # ── Source 4: Environment kernel config (ImageUpdater CRs) ───────────────
  - repoURL: https://github.com/gentian-org/gentian-deployments
    targetRevision: main
    path: dev/kernel
    directory:
      include: "image-updater.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: gentian-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
