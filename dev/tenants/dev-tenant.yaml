# Tenant CR: gtn-demo
#
# This Tenant is deployed by the app-of-apps ArgoCD Application.
# The gentian-os operator reconciles it to:
#   - Create namespace gentian-gtn-demo
#   - Provision a Keycloak realm + OIDC clients
#   - Create LDAP OUs (via UDM REST API)
#   - Create PostgreSQL/MariaDB databases (per app)
#   - Create MinIO buckets with tenant-scoped RBAC
#   - Create Redis ACL users
#   - Deploy enabled apps (from spec.apps) via ArgoCD Applications
#   - Generate per-tenant Ingress resources
apiVersion: gentianos.io/v1alpha1
kind: Tenant
metadata:
  name: gtn-demo
spec:
  displayName: "Gentian Demo"
  domain: desk.gentian.org
  adminEmail: admin@gentian.org

  isolation:
    mode: namespace
    ldapOU: "ou=gtn-demo,${UDM_LDAP_BASE}"
    keycloakRealm: gtn-demo
    databasePrefix: gtn_
    s3Prefix: gtn-demo-

  mail:
    mode: selfhosted
    domain: gentian.org
    quotaPerUser: 5Gi
    rateLimit: 100/h

  quotas:
    maxApps: 20
    storage: 100Gi
    cpu: "32"
    memory: 32Gi

  deletionPolicy: Retain

  apps:
    - profile: ox-appsuite
    - profile: openproject
    - profile: collabora
