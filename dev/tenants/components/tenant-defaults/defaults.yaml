apiVersion: gentianos.io/v1alpha1
kind: Tenant
metadata:
  name: placeholder  # matched via target selector above; name is ignored
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  deletionPolicy: Retain
  domain: desk.gentian.org
  isolation:
    mode: namespace
  mail:
    domain: gentian.org
    mode: selfhosted
    quotaPerUser: 5Gi
    rateLimit: 100/h
  quotas:
    cpu: 32
    maxApps: 20
    memory: 32Gi
    storage: 100Gi
