apiVersion: gentianos.io/v1alpha1
kind: Tenant
metadata:
  name: gtn-demo
spec:
  adminEmail: admin@gentian.org
  apps:
  - profile: element
  - profile: collabora
  deletionPolicy: Retain
  mail:
    domain: gentian.org
    mode: selfhosted
    quotaPerUser: 5Gi
    rateLimit: 100/h
  quotas:
    cpu: '32'
    maxApps: 20
    memory: 32Gi
    storage: 100Gi
